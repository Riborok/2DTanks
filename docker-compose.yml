# Порты на хосте:
#   5173 — фронт (nginx) + прокси /api и WebSocket /game на сервер
#   3000 — API/WebSocket напрямую (отладка; для игры через браузер достаточно 5173)
#   5432 — PostgreSQL
services:
  db:
    image: postgres:16-alpine
    container_name: 2dtanks-db
    environment:
      POSTGRES_USER: tanks
      POSTGRES_PASSWORD: tanks
      POSTGRES_DB: tanks2d
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - 2dtanks-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tanks -d tanks2d"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: 2dtanks-server
    ports:
      - "3000:3000"
    environment:
      SERVER_PORT: "3000"
      PORT: "3000"
      DATABASE_URL: postgresql://tanks:tanks@db:5432/tanks2d
      JWT_SECRET: ${JWT_SECRET:-docker-dev-change-me-use-long-random-string}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - 2dtanks-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        GAME_API_ORIGIN: ""
        GAME_WS_PATH: /game
    container_name: 2dtanks-frontend
    ports:
      - "5173:5173"
    depends_on:
      - server
    networks:
      - 2dtanks-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:5173 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  2dtanks-network:
    driver: bridge

volumes:
  postgres_data:
