map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream tanks_backend {
    server server:3000;
}

server {
    listen 5173;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PATCH, PUT";
    add_header Access-Control-Allow-Headers "Content-Type, Authorization";

    # REST API → Node (тот же origin :5173, не нужен открытый порт 3000 на хосте)
    location /api/ {
        proxy_pass http://tanks_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (игра) → тот же Node
    location /game {
        proxy_pass http://tanks_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /src/ {
        alias /usr/share/nginx/html/src/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
