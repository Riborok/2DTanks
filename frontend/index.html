<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#0c0a08">
    <link rel="icon" type="image/png" href="/src/img/icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/src/img/icon.png">
    <title>2DTanks Online</title>
    <script>
        (function () {
            try {
                var raw = localStorage.getItem('tanks.settings.v1');
                if (!raw) return;
                var o = JSON.parse(raw);
                var th = o && o.appearance && o.appearance.theme;
                if (th === 'light' || th === 'dark') {
                    document.documentElement.setAttribute('data-theme', th);
                    var m = document.querySelector('meta[name="theme-color"]');
                    if (m) m.setAttribute('content', th === 'light' ? '#e8e2d8' : '#0c0a08');
                }
            } catch (e) {
                /* ignore */
            }
        })();
    </script>

    <!-- Preload critical images -->
    <link rel="preload" href="/src/img/tanks/Bullets/Bullet_0.png" as="image">
    <link rel="preload" href="/src/img/tanks/Bullets/Bullet_1.png" as="image">
    <link rel="preload" href="/src/img/tanks/Bullets/Bullet_2.png" as="image">
    <link rel="preload" href="/src/img/tanks/Bullets/Bullet_3.png" as="image">
    <link rel="preload" href="/src/img/tanks/Bullets/Bullet_4.png" as="image">

    <link rel="preload" href="/src/img/tanks/Effects/Movement/Movement.png" as="image">
    <link rel="preload" href="/src/img/tanks/Effects/Sprites/Grenade_Effects_Explosion.png" as="image">
    <link rel="preload" href="/src/img/tanks/Effects/Sprites/Sprite_Effects_Explosion.png" as="image">
    <link rel="preload" href="/src/img/tanks/Effects/Sprites/Sprite_Effects_Smoke.png" as="image">
    <link rel="preload" href="/src/img/tanks/Effects/Sprites/Sprite_Fire_Shots_Impact_0.png" as="image">
    <link rel="preload" href="/src/img/tanks/Effects/Sprites/Sprite_Fire_Shots_Impact_1.png" as="image">
    <link rel="preload" href="/src/img/tanks/Effects/Sprites/Sprite_Fire_Shots_Shot_0.png" as="image">
    <link rel="preload" href="/src/img/tanks/Effects/Sprites/Sprite_Fire_Shots_Shot_1.png" as="image">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            /* 100dvh корректно учитывает адресную строку на iOS/Android, 100vh — fallback */
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: touch;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        /* Разрешаем выделение только внутри контролов, которым оно нужно */
        input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }

        #root {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="/src/js/bundle.js"></script>
    <script>
        // На webpack-dev-server service worker мешает: он может держать старый bundle.
        if ('serviceWorker' in navigator && location.port === '8081') {
            window.addEventListener('load', function () {
                navigator.serviceWorker.getRegistrations().then(function (items) {
                    items.forEach(function (r) { r.unregister(); });
                }).catch(function () { /* ignore */ });
            });
        } else if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1')) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/sw.js').catch(function () { /* ignore */ });
            });
        }
    </script>
</body>
</html>
